services:
  - type: web
    name: grid07-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: LLM_PROVIDER
        value: auto
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: CHROMA_COLLECTION_NAME
        value: grid07_personas
      - key: SIMILARITY_THRESHOLD
        value: "0.45"
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: BACKEND_PORT
        value: "10000"
      - key: GROQ_API_KEY
        sync: false
